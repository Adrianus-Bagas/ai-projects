[project]
name = "database"
version = "0.1.0"
description = "Shared database package for the AI workspace"
readme = "README.md"
requires-python = ">=3.12"

dependencies = [
    "sqlalchemy>=2.0",
    "asyncpg",
    "pydantic-settings",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["database"]